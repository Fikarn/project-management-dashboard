<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>SSE ExEd Studio Control</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #030712;
        color: #9ca3af;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        -webkit-app-region: drag;
      }
      .container {
        text-align: center;
      }
      .spinner {
        width: 32px;
        height: 32px;
        border: 2px solid #374151;
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 12px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      #status {
        font-size: 14px;
      }
      #sub-status {
        font-size: 12px;
        color: #6b7280;
        margin-top: 6px;
        min-height: 16px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="spinner"></div>
      <p id="status">Starting server...</p>
      <p id="sub-status"></p>
    </div>
  </body>
</html>
