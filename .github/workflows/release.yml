name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v* tag to rebuild or republish
        required: true
        type: string

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  validate-release:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci

      - run: npm run release:check -- --tag ${{ env.RELEASE_TAG }}

      - run: npm run format:check

      - run: npm run native:check

      - run: npm run native:test

      - run: npm run release:notes -- --tag ${{ env.RELEASE_TAG }} --out release-notes.md

      - name: Upload release notes
        uses: actions/upload-artifact@v7
        with:
          name: release-notes
          path: release-notes.md
          retention-days: 7

  create-release:
    needs: validate-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: release-notes
          path: .

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}

  build-native-macos:
    needs: [validate-release, create-release]
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Qt and QtIFW
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          host: mac
          target: desktop
          tools: "tools_ifw"

      - run: npm ci

      - run: npm run release:check -- --tag ${{ env.RELEASE_TAG }}

      - run: npm run native:release:mac:local
        env:
          SSE_NATIVE_PACKAGED_ACCEPTANCE_DIR: ${{ github.workspace }}/native-packaged-acceptance-macos
          SSE_NATIVE_BRIDGE_ACCEPTANCE_DIR: ${{ github.workspace }}/native-bridge-acceptance-macos
          SSE_NATIVE_DELIVERY_ACCEPTANCE_DIR: ${{ github.workspace }}/native-delivery-acceptance-macos
          SSE_NATIVE_INSTALLER_ACCEPTANCE_DIR: ${{ github.workspace }}/native-installer-acceptance-macos

      - name: Sign and notarize native macOS release artifacts
        run: npm run native:sign:mac:release
        env:
          SSE_MACOS_CODESIGN_IDENTITY: ${{ secrets.SSE_MACOS_CODESIGN_IDENTITY }}
          SSE_MACOS_NOTARY_KEYCHAIN_PROFILE: ${{ secrets.SSE_MACOS_NOTARY_KEYCHAIN_PROFILE }}
          SSE_MACOS_NOTARY_APPLE_ID: ${{ secrets.SSE_MACOS_NOTARY_APPLE_ID }}
          SSE_MACOS_NOTARY_PASSWORD: ${{ secrets.SSE_MACOS_NOTARY_PASSWORD }}
          SSE_MACOS_NOTARY_TEAM_ID: ${{ secrets.SSE_MACOS_NOTARY_TEAM_ID }}

      - name: Write native macOS checksum manifest
        run: npm run native:checksums:mac:write

      - name: Upload native macOS release artifacts to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            release/native/macos/SSE-ExEd-Studio-Control-Native-macOS.zip
            release/native-installer/macos/SSE-ExEd-Studio-Control-Native-macOS-Installer.zip
            release/native-updates/macos/SSE-ExEd-Studio-Control-Native-macOS-UpdateRepository.zip
            release/checksums/macos/SSE-ExEd-Studio-Control-Native-macOS-SHA256.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload native macOS build logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: release-native-macos-debug
          path: |
            release/native/macos/
            release/native-installer/macos/
            release/native-updates/macos/
            release/checksums/macos/
            native-packaged-acceptance-macos/
            native-bridge-acceptance-macos/
            native-delivery-acceptance-macos/
            native-installer-acceptance-macos/
            native/build/
          retention-days: 7

  build-native-windows:
    needs: [validate-release, create-release]
    runs-on: windows-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Qt and QtIFW
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          tools: "tools_ifw"

      - run: npm ci

      - run: npm run release:check -- --tag ${{ env.RELEASE_TAG }}

      - run: npm run native:release:win:local
        env:
          SSE_NATIVE_PACKAGED_ACCEPTANCE_DIR: ${{ github.workspace }}/native-packaged-acceptance-windows
          SSE_NATIVE_BRIDGE_ACCEPTANCE_DIR: ${{ github.workspace }}/native-bridge-acceptance-windows
          SSE_NATIVE_DELIVERY_ACCEPTANCE_DIR: ${{ github.workspace }}/native-delivery-acceptance-windows
          SSE_NATIVE_INSTALLER_ACCEPTANCE_DIR: ${{ github.workspace }}/native-installer-acceptance-windows

      - name: Sign native Windows release artifacts
        run: npm run native:sign:win:release
        env:
          SSE_WINDOWS_SIGN_CERT_PATH: ${{ secrets.SSE_WINDOWS_SIGN_CERT_PATH }}
          SSE_WINDOWS_SIGN_CERT_BASE64: ${{ secrets.SSE_WINDOWS_SIGN_CERT_BASE64 }}
          SSE_WINDOWS_SIGN_CERT_PASSWORD: ${{ secrets.SSE_WINDOWS_SIGN_CERT_PASSWORD }}
          SSE_WINDOWS_SIGN_TIMESTAMP_URL: ${{ secrets.SSE_WINDOWS_SIGN_TIMESTAMP_URL }}
          SSE_WINDOWS_SIGNTOOL_PATH: ${{ secrets.SSE_WINDOWS_SIGNTOOL_PATH }}

      - name: Write native Windows checksum manifest
        run: npm run native:checksums:win:write

      - name: Upload native Windows release artifacts to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            release/native/windows/SSE-ExEd-Studio-Control-Native-windows.zip
            release/native-installer/windows/SSE-ExEd-Studio-Control-Native-windows-Installer.exe
            release/native-updates/windows/SSE-ExEd-Studio-Control-Native-windows-UpdateRepository.zip
            release/checksums/windows/SSE-ExEd-Studio-Control-Native-windows-SHA256.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload native Windows build logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: release-native-windows-debug
          path: |
            release/native/windows/
            release/native-installer/windows/
            release/native-updates/windows/
            release/checksums/windows/
            native-packaged-acceptance-windows/
            native-bridge-acceptance-windows/
            native-delivery-acceptance-windows/
            native-installer-acceptance-windows/
            native/build/
          retention-days: 7
