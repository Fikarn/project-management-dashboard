name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        # --audit-level=critical: high-severity findings are either in dev-only
        # deps (electron-builder's node-tar) or Next.js features not used by
        # this app (Image Optimizer, RSC, rewrites). Fixing them requires a
        # Next.js 15 upgrade (breaking change). Revisit when upgrading Next.js.
        run: npm audit --audit-level=critical

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Release metadata check
        run: npm run release:check

      - name: TypeScript check
        run: npm run typecheck

      - name: Build (type-check)
        run: npm run build

      - name: Unit & API tests
        run: npm run test:coverage

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  native-foundation:
    runs-on: macos-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Qt
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: brew install qt

      - name: Native cargo check
        run: npm run native:check

      - name: Native cargo test
        run: npm run native:test

      - name: Native build
        run: CMAKE_PREFIX_PATH="$(brew --prefix qt)" npm run native:build

      - name: Native smoke test
        env:
          SSE_NATIVE_SMOKE_DIR: ${{ github.workspace }}/native-smoke
        run: npm run native:smoke

      - name: Native bundled-engine smoke test
        env:
          SSE_NATIVE_SMOKE_DIR: ${{ github.workspace }}/native-smoke-bundled
        run: npm run native:smoke:bundled-engine

      - name: Native acceptance test
        env:
          SSE_NATIVE_ACCEPTANCE_DIR: ${{ github.workspace }}/native-acceptance
        run: npm run native:acceptance

      - name: Upload native smoke artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: native-smoke
          path: native-smoke/
          retention-days: 7

      - name: Upload native bundled smoke artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: native-smoke-bundled
          path: native-smoke-bundled/
          retention-days: 7

      - name: Upload native acceptance artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: native-acceptance
          path: native-acceptance/
          retention-days: 7
