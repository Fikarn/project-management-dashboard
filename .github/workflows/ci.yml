name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        # --audit-level=critical: high-severity findings are either in dev-only
        # deps (electron-builder's node-tar) or Next.js features not used by
        # this app (Image Optimizer, RSC, rewrites). Fixing them requires a
        # Next.js 15 upgrade (breaking change). Revisit when upgrading Next.js.
        run: npm audit --audit-level=critical

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Release metadata check
        run: npm run release:check

      - name: TypeScript check
        run: npm run typecheck

      - name: Build (type-check)
        run: npm run build

      - name: Unit & API tests
        run: npm run test:coverage

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  native-foundation:
    runs-on: macos-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Qt and QtIFW
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          host: mac
          target: desktop
          tools: "tools_ifw"

      - name: Native cargo check
        run: npm run native:check

      - name: Native cargo test
        run: npm run native:test

      - name: Native build
        run: npm run native:build

      - name: Native smoke test
        env:
          SSE_NATIVE_SMOKE_DIR: ${{ github.workspace }}/native-smoke
        run: npm run native:smoke

      - name: Native clean-start smoke test
        env:
          SSE_NATIVE_SMOKE_DIR: ${{ github.workspace }}/native-smoke-clean
        run: npm run native:smoke:clean-start

      - name: Native bundled-engine smoke test
        env:
          SSE_NATIVE_SMOKE_DIR: ${{ github.workspace }}/native-smoke-bundled
        run: npm run native:smoke:bundled-engine

      - name: Native packaged macOS smoke test
        run: npm run native:package:mac:smoke

      - name: Native packaged macOS clean-start smoke test
        run: npm run native:package:mac:clean-smoke

      - name: Native macOS installer build
        run: npm run native:installer:mac:local

      - name: Native macOS update repository build
        run: npm run native:update-repo:mac:local

      - name: Native lifecycle smoke tests
        env:
          SSE_NATIVE_SMOKE_DIR: ${{ github.workspace }}/native-smoke-lifecycle
        run: npm run native:smoke:lifecycle

      - name: Native failure smoke tests
        env:
          SSE_NATIVE_SMOKE_DIR: ${{ github.workspace }}/native-smoke-failures
        run: npm run native:smoke:failures

      - name: Native acceptance test
        env:
          SSE_NATIVE_ACCEPTANCE_DIR: ${{ github.workspace }}/native-acceptance
        run: npm run native:acceptance

      - name: Upload native smoke artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: native-smoke
          path: native-smoke/
          retention-days: 7

      - name: Upload native bundled smoke artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: native-smoke-bundled
          path: native-smoke-bundled/
          retention-days: 7

      - name: Upload native clean-start smoke artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: native-smoke-clean
          path: native-smoke-clean/
          retention-days: 7

      - name: Upload native macOS package artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: native-package-macos
          path: |
            release/native/macos/
            release/native-installer/macos/
            release/native-updates/macos/
          retention-days: 7

      - name: Upload native lifecycle smoke artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: native-smoke-lifecycle
          path: native-smoke-lifecycle/
          retention-days: 7

      - name: Upload native failure smoke artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: native-smoke-failures
          path: native-smoke-failures/
          retention-days: 7

      - name: Upload native acceptance artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: native-acceptance
          path: native-acceptance/
          retention-days: 7

  native-foundation-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Qt and QtIFW
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          tools: "tools_ifw"

      - name: Native cargo check
        run: npm run native:check

      - name: Native cargo test
        run: npm run native:test

      - name: Native build
        run: npm run native:build

      - name: Native smoke test
        env:
          SSE_NATIVE_SMOKE_DIR: ${{ github.workspace }}/native-smoke-windows
        run: npm run native:smoke

      - name: Native clean-start smoke test
        env:
          SSE_NATIVE_SMOKE_DIR: ${{ github.workspace }}/native-smoke-windows-clean
        run: npm run native:smoke:clean-start

      - name: Native packaged Windows smoke test
        run: npm run native:package:win:smoke

      - name: Native packaged Windows clean-start smoke test
        run: npm run native:package:win:clean-smoke

      - name: Native Windows installer build
        run: npm run native:installer:win:local

      - name: Native Windows update repository build
        run: npm run native:update-repo:win:local

      - name: Upload native Windows smoke artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: native-smoke-windows
          path: native-smoke-windows/
          retention-days: 7

      - name: Upload native Windows clean-start smoke artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: native-smoke-windows-clean
          path: native-smoke-windows-clean/
          retention-days: 7

      - name: Upload native Windows package artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: native-package-windows
          path: |
            release/native/windows/
            release/native-installer/windows/
            release/native-updates/windows/
            native/build/
          retention-days: 7
