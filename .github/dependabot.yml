version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    target-branch: "main"
    schedule:
      interval: monthly
      time: "09:00"
      timezone: "Asia/Bangkok"
    open-pull-requests-limit: 3
    rebase-strategy: disabled
    allow:
      - dependency-type: direct
    commit-message:
      prefix: "chore(deps)"
    ignore:
      - dependency-name: "next"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "react"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "react-dom"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "electron"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "electron-builder"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "electron-updater"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "@electron/notarize"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "typescript"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "@playwright/test"
        update-types:
          - "version-update:semver-major"
    groups:
      runtime:
        update-types:
          - minor
          - patch
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@hello-pangea/dnd"
          - "@sentry/nextjs"
          - "lucide-react"
          - "node-osc"
          - "react-resizable-panels"
          - "sacn"
      electron:
        update-types:
          - minor
          - patch
        patterns:
          - "electron"
          - "electron-builder"
          - "electron-updater"
          - "@electron/*"
      testing:
        update-types:
          - minor
          - patch
        patterns:
          - "@playwright/*"
          - "vitest"
          - "@vitest/*"
      quality:
        update-types:
          - minor
          - patch
        patterns:
          - "eslint*"
          - "prettier*"
          - "@typescript-eslint/*"
          - "typescript"
      build-tooling:
        update-types:
          - minor
          - patch
        patterns:
          - "@next/bundle-analyzer"
          - "autoprefixer"
          - "husky"
          - "lint-staged"
          - "postcss"
          - "tailwindcss"
          - "tsx"

  - package-ecosystem: github-actions
    directory: "/"
    target-branch: "main"
    schedule:
      interval: monthly
      time: "09:00"
      timezone: "Asia/Bangkok"
    open-pull-requests-limit: 1
    rebase-strategy: disabled
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions:
        patterns:
          - "*"
