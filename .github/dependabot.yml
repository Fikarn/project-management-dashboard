version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      electron:
        patterns:
          - "electron"
          - "electron-builder"
          - "electron-updater"
          - "@electron/*"
      testing:
        patterns:
          - "@playwright/*"
          - "vitest"
          - "@vitest/*"
      linting:
        patterns:
          - "eslint*"
          - "prettier*"
          - "@typescript-eslint/*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
