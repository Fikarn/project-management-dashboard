version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    target-branch: "main"
    schedule:
      interval: monthly
      time: "09:00"
      timezone: "Europe/Stockholm"
    open-pull-requests-limit: 2
    rebase-strategy: disabled
    allow:
      - dependency-type: direct
    commit-message:
      prefix: "chore(deps)"
    groups:
      tooling:
        update-types:
          - minor
          - patch
        patterns:
          - "husky"
          - "lint-staged"
          - "prettier"

  - package-ecosystem: github-actions
    directory: "/"
    target-branch: "main"
    schedule:
      interval: monthly
      time: "09:00"
      timezone: "Europe/Stockholm"
    open-pull-requests-limit: 1
    rebase-strategy: disabled
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: cargo
    directory: "/native/rust-engine"
    target-branch: "main"
    schedule:
      interval: monthly
      time: "09:00"
      timezone: "Europe/Stockholm"
    open-pull-requests-limit: 2
    rebase-strategy: disabled
    commit-message:
      prefix: "chore(native-deps)"
    groups:
      native-runtime:
        update-types:
          - minor
          - patch
        patterns:
          - "rusqlite"
          - "serde"
          - "serde_json"
