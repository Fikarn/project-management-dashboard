appId: com.projectmanager.app
productName: Project Manager
copyright: Copyright © 2026

publish:
  provider: github
  owner: Fikarn
  repo: project-management-dashboard

directories:
  output: release

files:
  - dist-electron/**/*
  - "!node_modules"

extraResources:
  - from: .next/standalone
    to: standalone
    filter:
      - "**/*"
  - from: .next/static
    to: standalone/.next/static
    filter:
      - "**/*"
  # public/ is empty/absent — omitted to avoid electron-builder warning
  - from: build/tray-icon.ico
    to: tray-icon.ico

afterPack: ./scripts/afterPack.js
afterSign: ./electron/notarize.js

mac:
  icon: build/icon.png
  target:
    - target: dmg
      arch: arm64
  category: public.app-category.productivity
  # identity: null  ← removed so CSC_LINK cert is used when available in CI
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: electron/entitlements.plist
  entitlementsInherit: electron/entitlements.plist

dmg:
  title: Project Manager

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch: x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  deleteAppDataOnUninstall: false
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
