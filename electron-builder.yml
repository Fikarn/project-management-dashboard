appId: com.projectmanager.app
productName: Project Manager
copyright: Copyright © 2026

directories:
  output: release

files:
  - dist-electron/**/*
  - "!node_modules"

extraResources:
  - from: .next/standalone
    to: standalone
    filter:
      - "**/*"
  - from: .next/static
    to: standalone/.next/static
    filter:
      - "**/*"
  - from: public
    to: standalone/public
    filter:
      - "**/*"
  - from: build/tray-icon.ico
    to: tray-icon.ico

afterPack: ./scripts/afterPack.js

mac:
  icon: build/icon.png
  target:
    - target: dmg
      arch: arm64
  category: public.app-category.productivity
  identity: null

dmg:
  title: Project Manager

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch: x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  deleteAppDataOnUninstall: false
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
